<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>홈</title>
  <style>
    body { font-family: 'Malgun Gothic', Arial, sans-serif; margin: 0; padding: 24px; }
    .wrap { max-width: 900px; margin: 0 auto; }
    h1 { color: #333; }
    p { color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>환영합니다</h1>
    <p>이 프레임은 홈페이지의 콘텐츠 영역입니다. iframe으로 로드되며, 사이드바에서 메뉴를 클릭하면 이 영역의 src가 변경되어 페이지를 전환합니다.</p>
    <p>현재 이 파일은 배포에 필요한 최소 콘텐츠로 제공됩니다. 원본 콘텐츠를 이 파일들로 교체하거나, 서버 사이드 렌더링을 연결하려면 추가 작업이 필요합니다.</p>
  </div>
</body>
</html>
